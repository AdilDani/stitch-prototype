<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STITCH_ENGINE — Chapters</title>
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/novel-nav.css">
<style>
  body { background: #0a0a0c; color: #ededed; }
  body::before { opacity: 0.18; mix-blend-mode: overlay; }
  .wrap { max-width: 720px; margin: 0 auto; background: #0a0a0c; min-height: 100vh; padding-bottom: 80px; }

  @media (min-width: 1200px) { .wrap { max-width: 760px; } }

  /* ── light mode overrides ── */
  body.light { background: #f4f2ec; color: #0a0a0a; }
  body.light::before { opacity: 0.12; mix-blend-mode: multiply; }
  body.light .wrap { background: #f4f2ec; }
  body.light .back-mirror { background: rgba(244,242,236,0.85); border-color: rgba(10,10,10,0.22); color: #0a0a0a; }
  body.light .theme-btn { background: rgba(244,242,236,0.85); border-color: rgba(10,10,10,0.22); color: #0a0a0a; }
  body.light .header { border-color: rgba(10,10,10,0.1); }
  body.light .header .kicker { color: rgba(10,10,10,0.4); }
  body.light .header h1 { color: #0a0a0a; }
  body.light .header .sub { color: rgba(10,10,10,0.5); }
  body.light .overall { border-color: rgba(10,10,10,0.1); color: rgba(10,10,10,0.5); }
  body.light .overall .bar { background: rgba(10,10,10,0.1); }
  body.light .overall .bar-fill { background: rgba(10,10,10,0.4); }
  body.light .act-head { border-color: rgba(10,10,10,0.1); }
  body.light .act-head:hover { background: rgba(10,10,10,0.03); }
  body.light .act-head .idx { color: rgba(10,10,10,0.4); }
  body.light .act-head .h { color: #0a0a0a; }
  body.light .act-progress-badge { border-color: rgba(10,10,10,0.18); color: rgba(10,10,10,0.5); }
  body.light .chevron { color: rgba(10,10,10,0.4); }
  body.light .ch { border-color: rgba(10,10,10,0.08); }
  body.light .ch-num { color: rgba(10,10,10,0.3); }
  body.light .ch.cleared .ch-num { color: rgba(10,10,10,0.2); }
  body.light .ch.current .ch-num { color: #0a0a0a; }
  body.light .ch-title { color: #0a0a0a; }
  body.light .ch.cleared .ch-title { color: rgba(10,10,10,0.38); }
  body.light .ch-meta { color: rgba(10,10,10,0.38); }
  body.light .ch .check { background: rgba(10,10,10,0.08); color: rgba(10,10,10,0.45); }
  body.light .ch .check.cleared-icon { background: rgba(10,10,10,0.08); color: rgba(10,10,10,0.35); }
  body.light .ch.upcoming .ch-num { color: rgba(10,10,10,0.18); }
  body.light .ch.upcoming .ch-title { color: rgba(10,10,10,0.35); }
  body.light .ch.upcoming .check { background: transparent; border: 1px solid rgba(10,10,10,0.12); color: rgba(10,10,10,0.3); }
  body.light .ch-progress { background: rgba(10,10,10,0.08); }
  body.light .ch-progress .fill { background: var(--accent); }
  body.light .ch.cleared .ch-progress .fill { background: rgba(10,10,10,0.18); }

  /* ── fixed controls ── */
  .back-mirror, .theme-btn {
    position: fixed;
    z-index: 150;
    width: 38px; height: 38px;
    display: grid; place-items: center;
    background: rgba(10,10,10,0.65);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(237,237,237,0.25);
    color: #ededed;
    cursor: pointer;
  }
  .back-mirror { top: 16px; left: 16px; }
  .theme-btn { top: 16px; right: 16px; border: none; }
  .theme-btn:hover { border: 1px solid rgba(237,237,237,0.5); }
  body.light .theme-btn:hover { border: 1px solid rgba(10,10,10,0.4); }

  /* ── header ── */
  .header {
    padding: 60px 28px 28px;
    border-bottom: 1px solid rgba(237,237,237,0.12);
  }
  .header .kicker {
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase;
    color: rgba(237,237,237,0.4);
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(56px, 12vw, 88px);
    letter-spacing: -0.04em; line-height: 0.88;
    color: #ededed; text-transform: uppercase;
  }
  .header .sub {
    font-family: var(--font-editorial); font-style: italic;
    font-weight: 700;
    font-size: clamp(22px, 5vw, 36px);
    line-height: 1.1;
    color: rgba(237,237,237,0.55);
    margin-top: 10px; letter-spacing: -0.01em;
  }

  /* ── overall progress ── */
  .overall {
    display: flex; gap: 14px; align-items: center;
    padding: 16px 28px;
    border-bottom: 1px solid rgba(237,237,237,0.12);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.18em; color: rgba(237,237,237,0.5);
    text-transform: uppercase;
  }
  .overall .bar { flex: 1; height: 2px; background: rgba(237,237,237,0.12); }
  .overall .bar-fill { height: 100%; background: rgba(237,237,237,0.45); }

  /* ── act section ── */
  .act { margin-top: 0; }
  .act-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid rgba(237,237,237,0.12);
    cursor: pointer;
    background: transparent;
    width: 100%; text-align: left;
    color: inherit;
    transition: background 0.15s;
    gap: 12px;
  }
  .act-head:hover { background: rgba(237,237,237,0.03); }
  .act-head-left { display: flex; flex-direction: column; gap: 3px; }
  .act-head .idx {
    font-family: var(--font-mono); font-size: 10px;
    color: rgba(237,237,237,0.4); letter-spacing: 0.2em; text-transform: uppercase;
  }
  .act-head .h {
    font-family: var(--font-display); font-weight: 900;
    font-size: 20px; letter-spacing: -0.02em; color: #ededed;
  }
  .act-head-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .act-progress-badge {
    padding: 4px 10px;
    border: 1px solid rgba(237,237,237,0.2);
    color: rgba(237,237,237,0.5);
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
  .chevron {
    width: 16px; height: 16px;
    color: rgba(237,237,237,0.4);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .act.open .chevron { transform: rotate(180deg); }

  /* ── act body (collapsible) ── */
  .act-body {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.28s ease;
  }
  .act.open .act-body { max-height: 2000px; }

  /* ── chapter rows ── */
  .ch-list { padding: 0 28px; }
  .ch {
    display: grid;
    grid-template-columns: 42px 1fr auto;
    gap: 14px;
    padding: 18px 0;
    border-bottom: 1px solid rgba(237,237,237,0.08);
    align-items: center;
    text-decoration: none; color: inherit;
    cursor: pointer;
  }
  .ch:last-child { border-bottom: none; }
  .ch-num {
    font-family: var(--font-mono); font-size: 14px; font-weight: 700;
    color: rgba(237,237,237,0.3); letter-spacing: -0.02em;
  }
  .ch.cleared .ch-num { color: rgba(237,237,237,0.2); text-decoration: line-through; }
  .ch.current .ch-num { color: #ededed; }
  .ch.upcoming .ch-num { color: rgba(237,237,237,0.18); }

  .ch-title {
    font-family: var(--font-display); font-weight: 700;
    font-size: 16px; letter-spacing: -0.01em; line-height: 1.2; color: #ededed;
  }
  .ch.cleared .ch-title { color: rgba(237,237,237,0.4); }
  .ch.upcoming .ch-title {
    color: rgba(237,237,237,0.25);
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.14em; text-transform: uppercase; font-weight: 400;
  }
  .ch-meta {
    font-family: var(--font-mono); font-size: 10px;
    color: rgba(237,237,237,0.35); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 3px;
  }

  .ch .right { display: flex; align-items: center; gap: 8px; }
  .ch .check {
    width: 22px; height: 22px; background: rgba(237,237,237,0.15);
    display: grid; place-items: center; color: rgba(237,237,237,0.5);
  }
  .ch .check svg { width: 12px; height: 12px; }
  .ch.upcoming .check { background: transparent; border: 1px solid rgba(237,237,237,0.12); color: rgba(237,237,237,0.3); }

  .resume-btn {
    padding: 10px 16px;
    background: var(--accent); color: #ededed; border: none;
    font-family: var(--font-display); font-weight: 800;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    cursor: pointer;
    box-shadow: 4px 4px 0 #ededed;
    transition: transform .15s, box-shadow .15s;
    text-decoration: none; display: inline-block;
  }
  .resume-btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #ededed; }
  .resume-btn:active { transform: translate(0,0); box-shadow: 0 0 0 #ededed; }

  .ch-progress {
    grid-column: 1 / -1; height: 2px;
    background: rgba(237,237,237,0.1); margin-top: 6px;
  }
  .ch-progress .fill {
    height: 100%; background: var(--accent);
  }
  .ch.cleared .ch-progress .fill { background: rgba(237,237,237,0.2); }
</style>
</head>
<body>

<a class="back-mirror" href="novel-home.html?id=stitch-engine" title="Back">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
</a>
<button class="theme-btn" id="theme-btn" aria-label="Toggle theme"></button>

<div class="wrap">

  <section class="header">
    <div class="kicker">// STITCH_ENGINE &middot; CHAPTER_ARCHIVE</div>
    <h1>Chapters.</h1>
    <p class="sub">Act by act. Read in sequence.</p>
  </section>

  <div class="overall">
    <span id="overall-label">— / — cleared</span>
    <div class="bar"><div class="bar-fill" id="bar-fill"></div></div>
    <span id="overall-pct">—%</span>
  </div>

  <div id="chapters-container"></div>

</div>

<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script>
  mountNovelNav({ novelId: 'stitch-engine', active: 'chapters' });

  /* ── theme toggle ── */
  (function() {
    const T = 'novel_theme';
    if (localStorage.getItem(T) === 'light') document.body.classList.add('light');
    const btn = document.getElementById('theme-btn');
    function updateBtn() {
      const light = document.body.classList.contains('light');
      btn.innerHTML = light
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';
      btn.title = light ? 'Switch to dark mode' : 'Switch to light mode';
    }
    btn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      localStorage.setItem(T, document.body.classList.contains('light') ? 'light' : 'dark');
      updateBtn();
    });
    updateBtn();
  })();

  /* ── chapter data ── */
  const CHAPTER_DATA = [
    { n: 1,  act: 1, title: 'The Cold Boot Sequence',         pub: '2 weeks ago', words: 2800 },
    { n: 2,  act: 1, title: 'Fragments in the Cache',          pub: '12 days ago', words: 3200 },
    { n: 3,  act: 1, title: 'Syntax Error: Memory Corrupted',  pub: '9 days ago',  words: 3600 },
    { n: 4,  act: 1, title: 'Compiling the First Thread',      pub: '6 days ago',  words: 4400 },
    { n: 5,  act: 1, title: 'Executing Runtime Protocol',      pub: '2 days ago',  words: 3600 },
    { n: 6,  act: 2, title: 'The Architecture of Silence',     pub: 'Friday',      words: null  },
    { n: 7,  act: 2, title: 'Anomalous Data Packets',          pub: null,          words: null  },
    { n: 8,  act: 2, title: null,                              pub: null,          words: null  },
    { n: 9,  act: 2, title: null,                              pub: null,          words: null  },
    { n: 10, act: 3, title: null,                              pub: null,          words: null  },
    { n: 11, act: 3, title: null,                              pub: null,          words: null  },
    { n: 12, act: 3, title: null,                              pub: null,          words: null  },
  ];
  const ACT_META = { 1: 'Initialization', 2: 'Execution', 3: 'Resolution' };

  function fmtWords(n) { return (n / 1000).toFixed(1) + 'k words'; }

  function getCleared() {
    const user = STITCH.getUser();
    return user.clearedChapters?.['stitch-engine'] || [1, 2, 3, 4];
  }

  function markRead(n) {
    const user = STITCH.getUser();
    const cleared = [...(user.clearedChapters?.['stitch-engine'] || [1, 2, 3, 4])];
    if (!cleared.includes(n)) {
      cleared.push(n);
      const newCap = Math.max(user.readCaps?.['stitch-engine'] || 0, n);
      STITCH.setUser({
        clearedChapters: { ...(user.clearedChapters || {}), 'stitch-engine': cleared },
        readCaps: { ...(user.readCaps || {}), 'stitch-engine': newCap },
      });
    }
  }

  /* open state per act: undefined = use default, true/false = user-toggled */
  const openState = {};

  function actStats(actNum, cleared) {
    const chs = CHAPTER_DATA.filter(c => c.act === actNum);
    const published = chs.filter(c => c.words != null);
    const clearedCount = published.filter(c => cleared.includes(c.n)).length;
    return { published: published.length, cleared: clearedCount };
  }

  function defaultOpen(actNum, cleared) {
    const { published, cleared: c } = actStats(actNum, cleared);
    if (published === 0) return false;
    return c > 0 && c < published; // in-progress only
  }

  function isOpen(actNum, cleared) {
    if (openState[actNum] !== undefined) return openState[actNum];
    return defaultOpen(actNum, cleared);
  }

  function renderOverall(cleared) {
    const published = CHAPTER_DATA.filter(c => c.words != null).length;
    const total = CHAPTER_DATA.length;
    const c = CHAPTER_DATA.filter(ch => ch.words != null && cleared.includes(ch.n)).length;
    document.getElementById('overall-label').textContent = `${c} / ${total} cleared`;
    document.getElementById('overall-pct').textContent = Math.round(c / total * 100) + '%';
    document.getElementById('bar-fill').style.width = (c / total * 100) + '%';
  }

  function render() {
    const cleared = getCleared();
    renderOverall(cleared);
    const acts = [1, 2, 3];
    const container = document.getElementById('chapters-container');

    container.innerHTML = acts.map(actNum => {
      const { published, cleared: clearedCount } = actStats(actNum, cleared);
      const open = isOpen(actNum, cleared);
      const badgeTxt = published > 0 ? `${clearedCount} / ${published}` : '— / —';

      const rows = CHAPTER_DATA.filter(c => c.act === actNum).map(c => {
        if (c.words != null) {
          /* published chapter */
          const isCleared = cleared.includes(c.n);
          /* chapter 5 is "current" if not yet cleared */
          const isCurrent = !isCleared && c.n === Math.max(...CHAPTER_DATA.filter(x => x.words != null).map(x => x.n).filter(n => cleared.includes(n) || n === c.n));
          const stateClass = isCleared ? 'cleared' : isCurrent ? 'current' : '';
          const metaParts = [c.pub, fmtWords(c.words)];

          if (isCleared) {
            return `<a href="read.html?id=stitch-engine&ch=${c.n}" class="ch cleared" data-ch="${c.n}">
              <div class="ch-num">${String(c.n).padStart(2,'0')}</div>
              <div>
                <div class="ch-title">${c.title}</div>
                <div class="ch-meta">${metaParts.join(' &middot; ')}</div>
              </div>
              <div class="right">
                <div class="check cleared-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>
              </div>
              <div class="ch-progress"><div class="fill" style="width:100%"></div></div>
            </a>`;
          }
          if (isCurrent) {
            return `<a href="read.html?id=stitch-engine&ch=${c.n}" class="ch current" data-ch="${c.n}">
              <div class="ch-num">${String(c.n).padStart(2,'0')}</div>
              <div>
                <div class="ch-title">${c.title}</div>
                <div class="ch-meta">IN PROGRESS &middot; ${fmtWords(c.words)}</div>
              </div>
              <div class="right">
                <a href="read.html?id=stitch-engine&ch=${c.n}" class="resume-btn" onclick="markAndNav(event,${c.n})">Resume</a>
              </div>
              <div class="ch-progress"><div class="fill" style="width:28%"></div></div>
            </a>`;
          }
          /* unread accessible chapter */
          return `<a href="read.html?id=stitch-engine&ch=${c.n}" class="ch" data-ch="${c.n}">
            <div class="ch-num">${String(c.n).padStart(2,'0')}</div>
            <div>
              <div class="ch-title">${c.title}</div>
              <div class="ch-meta">${metaParts.join(' &middot; ')}</div>
            </div>
            <div class="right">
              <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg></div>
            </div>
          </a>`;
        }

        /* upcoming chapter */
        const upcoming = c.pub ? `UNLOCKS ${c.pub.toUpperCase()}` : 'UPCOMING';
        const titleTxt = c.title || 'UPCOMING CHAPTER';
        return `<div class="ch upcoming">
          <div class="ch-num">${String(c.n).padStart(2,'0')}</div>
          <div>
            <div class="ch-title">${titleTxt}</div>
            <div class="ch-meta">${upcoming}</div>
          </div>
          <div class="right">
            <div class="check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="1"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
          </div>
        </div>`;
      }).join('');

      return `<section class="act${open ? ' open' : ''}" data-act="${actNum}">
        <button class="act-head" data-act-toggle="${actNum}">
          <div class="act-head-left">
            <span class="idx">Act ${String(actNum).padStart(2,'0')}</span>
            <span class="h">${ACT_META[actNum]}</span>
          </div>
          <div class="act-head-right">
            <span class="act-progress-badge">${badgeTxt}</span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="6 9 12 15 18 9"/></svg>
          </div>
        </button>
        <div class="act-body"><div class="ch-list">${rows}</div></div>
      </section>`;
    }).join('');

    /* act toggle handlers */
    container.querySelectorAll('[data-act-toggle]').forEach(btn => {
      btn.addEventListener('click', () => {
        const n = Number(btn.dataset.actToggle);
        const sec = btn.closest('.act');
        openState[n] = !sec.classList.contains('open');
        sec.classList.toggle('open', openState[n]);
      });
    });

    /* chapter click → mark as read, then navigate */
    container.querySelectorAll('a.ch[data-ch]').forEach(link => {
      link.addEventListener('click', (e) => {
        const n = Number(link.dataset.ch);
        markRead(n);
        /* check if act is now complete → collapse after re-render on return */
        /* re-render happens on next page load; no need to re-render here */
      });
    });
  }

  function markAndNav(e, n) {
    e.stopPropagation();
    markRead(n);
  }

  render();
</script>
</body>
</html>
