<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STITCH — Enter private code</title>
<link rel="stylesheet" href="css/core.css">
<style>
  body {
    min-height: 100vh;
    background: var(--ink);
    display: grid; place-items: center;
    padding: 20px;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(circle at 50% 40%, rgba(209, 72, 41, 0.2), transparent 60%);
    pointer-events: none;
  }

  .modal {
    position: relative; z-index: 2;
    background: var(--paper);
    width: 100%; max-width: 440px;
    padding: 40px 32px;
    border: 1.5px solid var(--ink);
    box-shadow: 12px 12px 0 var(--accent);
  }
  .close {
    position: absolute;
    top: 16px; right: 16px;
    width: 32px; height: 32px;
    display: grid; place-items: center;
    border: 1px solid var(--ink);
    cursor: pointer;
  }
  .close:hover { background: var(--ink); color: var(--paper); }

  .tag-row { display: flex; gap: 8px; margin-bottom: 20px; }

  h1 { font-size: 40px; margin-bottom: 12px; }
  .sub {
    font-family: var(--font-editorial); font-style: italic;
    color: var(--muted); font-size: 16px; margin-bottom: 32px;
  }

  .code-input {
    display: flex; justify-content: space-between; gap: 8px;
    margin-bottom: 20px;
  }
  .code-cell {
    flex: 1;
    aspect-ratio: 0.9;
    font-family: var(--font-display); font-weight: 900;
    font-size: 28px;
    text-align: center;
    border: 1.5px solid var(--ink);
    background: var(--paper-2);
    color: var(--ink);
    outline: none;
    text-transform: uppercase;
  }
  .code-cell.sep-before { margin-left: 10px; position: relative; }
  .code-cell.sep-before::before {
    content: '·';
    position: absolute;
    left: -14px; top: 50%; transform: translateY(-50%);
    color: var(--muted);
    font-size: 28px;
  }
  .code-cell:focus {
    background: var(--ink); color: var(--paper);
    box-shadow: 4px 4px 0 var(--accent);
  }
  .code-cell.filled { background: var(--ink); color: var(--paper); }

  .encrypt-chip {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    padding: 10px;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    border: 1px solid var(--line);
    background: var(--paper-2);
    margin-bottom: 24px;
  }
  .encrypt-chip svg { color: var(--accent); }

  .btn-stack { display: flex; flex-direction: column; gap: 10px; }

  .hint-text {
    margin-top: 24px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.05em;
    text-align: center;
  }
</style>
</head>
<body>

<div class="modal">
  <button class="close" onclick="history.length>1?history.back():location.href='home.html'" aria-label="Close">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
  </button>

  <div class="tag-row">
    <span class="tag tag-solid">PRIVATE</span>
    <span class="tag">6-CHAR PROTOCOL</span>
  </div>

  <h1 class="display">Enter access code</h1>
  <p class="sub">Provide the protocol code to access a private narrative. The author shared it with you out-of-band.</p>

  <div class="code-input" id="code">
    <input class="code-cell" maxlength="1">
    <input class="code-cell" maxlength="1">
    <input class="code-cell" maxlength="1">
    <input class="code-cell sep-before" maxlength="1">
    <input class="code-cell" maxlength="1">
    <input class="code-cell" maxlength="1">
  </div>

  <div class="encrypt-chip">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="1"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
    End-to-end encrypted
  </div>

  <div class="btn-stack">
    <button class="btn" id="verify">Verify code</button>
    <button class="btn btn-outline" onclick="history.length>1?history.back():location.href='home.html'">Cancel</button>
  </div>

  <div class="hint-text">Prototype hint — type any 6 chars and hit verify.</div>
</div>

<script>
  const cells = document.querySelectorAll('.code-cell');
  cells.forEach((c, i) => {
    c.addEventListener('input', () => {
      c.value = c.value.toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,1);
      c.classList.toggle('filled', !!c.value);
      if (c.value && i < cells.length - 1) cells[i+1].focus();
    });
    c.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !c.value && i > 0) cells[i-1].focus();
    });
    c.addEventListener('paste', e => {
      e.preventDefault();
      const p = (e.clipboardData.getData('text') || '').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6);
      p.split('').forEach((ch,j)=>{ if(cells[j]){cells[j].value = ch; cells[j].classList.add('filled');}});
      (cells[p.length] || cells[5]).focus();
    });
  });
  document.getElementById('verify').addEventListener('click', () => {
    const code = Array.from(cells).map(c => c.value).join('');
    if (code.length < 6) {
      cells[0].focus();
      return;
    }
    location.href = 'novel-home.html?id=stitch-engine&joined=1';
  });
</script>
</body>
</html>
