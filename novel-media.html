<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STITCH_ENGINE — Media</title>
<link rel="stylesheet" href="css/core.css">
<link rel="stylesheet" href="css/novel-nav.css">
<style>
  body { background: #0a0a0c; color: #ededed; }
  body::before { opacity: 0.18; mix-blend-mode: overlay; }
  .wrap { max-width: 720px; margin: 0 auto; background: #0a0a0c; min-height: 100vh; padding-bottom: 60px; }

  body.light { background: #f4f2ec; color: #0a0a0a; }
  body.light::before { opacity: 0.12; mix-blend-mode: multiply; }
  body.light .wrap { background: #f4f2ec; }
  body.light .back-mirror,
  body.light .theme-btn { background: rgba(244,242,236,0.85); border-color: rgba(10,10,10,0.22); color: #0a0a0a; }
  body.light .header { border-color: rgba(10,10,10,0.1); }
  body.light .kicker { color: rgba(10,10,10,0.4); }
  body.light .header h1 { color: #0a0a0a; }
  body.light .header .sub { color: rgba(10,10,10,0.45); }
  body.light .tabs { background: rgba(244,242,236,0.92); border-color: rgba(10,10,10,0.1); }
  body.light .tabs button { color: rgba(10,10,10,0.4); border-color: rgba(10,10,10,0.08); }
  body.light .tabs button:hover { color: rgba(10,10,10,0.7); }
  body.light .tabs button.active { color: #0a0a0a; }
  body.light .m-item { border-color: rgba(10,10,10,0.12); background: #eae7dd; }
  body.light .m-item .type { color: rgba(10,10,10,0.4); }
  body.light .m-item .t { color: #0a0a0a; }
  body.light .m-item .ch-tag { color: rgba(10,10,10,0.4); }
  body.light .m-item .by { color: rgba(10,10,10,0.45); }
  body.light .m-item .spoiler-cover { background: rgba(244,242,236,0.92); color: #0a0a0a; }
  body.light .empty { color: rgba(10,10,10,0.35); }

  @media (min-width: 1200px) {
    .wrap { max-width: 760px; }
  }

  .back-mirror, .theme-btn {
    position: fixed; z-index: 150;
    width: 38px; height: 38px;
    display: grid; place-items: center;
    background: rgba(10,10,10,0.65);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(237,237,237,0.25);
    color: #ededed;
    cursor: pointer;
  }
  .back-mirror { top: 16px; left: 16px; }
  .theme-btn { top: 16px; right: 16px; border: none; }
  .theme-btn:hover { border: 1px solid rgba(237,237,237,0.5); }
  body.light .theme-btn:hover { border: 1px solid rgba(10,10,10,0.4); }

  .header {
    padding: 60px 28px 28px;
    border-bottom: 1px solid rgba(237,237,237,0.12);
  }
  .kicker {
    font-family: var(--font-mono); font-size: 10px;
    color: rgba(237,237,237,0.4); letter-spacing: 0.22em;
    text-transform: uppercase; margin-bottom: 20px;
  }
  .header h1 {
    font-family: var(--font-display); font-weight: 900;
    font-size: clamp(56px, 12vw, 88px);
    letter-spacing: -0.04em; line-height: 0.88;
    color: #ededed;
    text-transform: uppercase;
  }
  .header .sub {
    font-family: var(--font-editorial); font-style: italic;
    font-weight: 700;
    font-size: clamp(22px, 4vw, 34px);
    line-height: 1.1;
    color: rgba(237,237,237,0.45);
    margin-top: 10px;
    letter-spacing: -0.01em;
  }

  .tabs {
    display: flex;
    border-top: 1px solid rgba(237,237,237,0.12);
    border-bottom: 1px solid rgba(237,237,237,0.12);
    position: sticky; top: 0; z-index: 40;
    background: rgba(10,10,12,0.92);
    backdrop-filter: blur(8px);
  }
  .tabs button {
    flex: 1;
    padding: 14px 6px;
    font-family: var(--font-display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(237,237,237,0.4);
    border-right: 1px solid rgba(237,237,237,0.08);
    background: transparent; cursor: pointer;
    position: relative;
    transition: color .15s;
  }
  .tabs button:last-child { border-right: none; }
  .tabs button:hover { color: rgba(237,237,237,0.75); }
  .tabs button.active { color: #ededed; }
  .tabs button.active::after {
    content: ''; position: absolute;
    left: 20%; right: 20%; bottom: -1px; height: 2px;
    background: var(--accent);
  }

  .gallery {
    padding: 24px 28px;
    display: grid; gap: 20px;
  }
  .m-item {
    border: 1px solid rgba(237,237,237,0.12);
    overflow: hidden;
    background: #12121a;
    position: relative;
  }
  .m-item .art { width: 100%; aspect-ratio: 4/3; overflow: hidden; }
  .m-item .art svg { width: 100%; height: 100%; display: block; }
  .m-item .info {
    padding: 14px 16px;
    display: flex; justify-content: space-between; align-items: start;
    gap: 10px;
  }
  .m-item .type {
    font-family: var(--font-mono); font-size: 10px;
    color: rgba(237,237,237,0.4);
    letter-spacing: 0.2em; font-weight: 700;
    text-transform: uppercase;
  }
  .m-item .t { font-family: var(--font-display); font-weight: 800; font-size: 16px; letter-spacing: -0.01em; margin-top: 4px; color: #ededed; }
  .m-item .ch-tag { font-family: var(--font-mono); font-size: 10px; color: rgba(237,237,237,0.4); letter-spacing: 0.14em; text-transform: uppercase; }
  .m-item .by { font-family: var(--font-mono); font-size: 11px; color: rgba(237,237,237,0.45); margin-top: 2px; }

  .m-item .spoiler-cover {
    position: absolute; inset: 0;
    background: rgba(10,10,10,0.9);
    color: #ededed;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    font-family: var(--font-display); font-weight: 700;
    font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase;
    cursor: pointer; transition: opacity 0.3s;
  }
  /* spoiler icon uses accent as the spoiler boundary signal */
  .m-item .spoiler-cover svg { width: 24px; height: 24px; color: var(--accent); }
  .m-item .spoiler-cover .sub { font-weight: 400; font-size: 10px; opacity: 0.65; letter-spacing: 0.12em; }
  .m-item.revealed .spoiler-cover { opacity: 0; pointer-events: none; }

  .empty { text-align: center; padding: 60px 20px; color: rgba(237,237,237,0.35); font-family: var(--font-editorial); font-style: italic; }
</style>
</head>
<body>

<a class="back-mirror" href="novel-home.html?id=stitch-engine" title="Back">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
</a>
<button class="theme-btn" id="theme-btn" aria-label="Toggle theme"></button>

<div class="wrap">

  <section class="header">
    <div class="kicker">// STITCH_ENGINE &middot; VISUAL_ARCHIVE</div>
    <h1>Gallery.</h1>
    <p class="sub">Official art, fan work &amp; memes.</p>
  </section>

  <div class="tabs" id="tabs">
    <button data-t="official" class="active">Official Art</button>
    <button data-t="fanart">Fan Art</button>
    <button data-t="meme">Memes</button>
  </div>

  <div class="gallery" id="gallery"></div>
</div>

<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script>
  mountNovelNav({ novelId: 'stitch-engine', active: 'media' });
  (function() {
    const T = 'novel_theme';
    if (localStorage.getItem(T) === 'light') document.body.classList.add('light');
    const btn = document.getElementById('theme-btn');
    function updateBtn() {
      const light = document.body.classList.contains('light');
      btn.innerHTML = light
        ? '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>'
        : '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>';
      btn.title = light ? 'Switch to dark mode' : 'Switch to light mode';
    }
    btn.addEventListener('click', () => {
      document.body.classList.toggle('light');
      localStorage.setItem(T, document.body.classList.contains('light') ? 'light' : 'dark');
      updateBtn();
    });
    updateBtn();
  })();

  let tab = 'official';
  document.getElementById('tabs').addEventListener('click', e => {
    const b = e.target.closest('[data-t]'); if (!b) return;
    tab = b.dataset.t;
    document.querySelectorAll('#tabs button').forEach(x => x.classList.toggle('active', x.dataset.t === tab));
    render();
  });

  function render() {
    const items = STITCH.MEDIA.filter(m => m.novel === 'stitch-engine' && m.type === tab);
    const cap = STITCH.getUser().readCaps['stitch-engine'] ?? 5;
    const gal = document.getElementById('gallery');
    if (!items.length) {
      gal.innerHTML = `<div class="empty">No ${tab} items yet for this novel.</div>`;
      return;
    }
    gal.innerHTML = items.map(m => {
      const blurred = m.spoiler || m.chapter > cap;
      return `<div class="m-item ${blurred?'':'revealed'}">
        <div class="art">${artSvg(m.art)}</div>
        <div class="info">
          <div>
            <span class="type">${m.type.toUpperCase()}</span>
            <div class="t">${m.title}</div>
            <div class="by">${m.type === 'official' ? 'BY SYSTEM ARCHITECT' : 'BY @FANUSER_' + String(m.id).slice(-2).toUpperCase()}</div>
          </div>
          <span class="ch-tag">CH. ${m.chapter}${blurred ? ' · SPOILER' : ''}</span>
        </div>
        ${blurred ? `<div class="spoiler-cover" onclick="this.parentNode.classList.add('revealed')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          <span>SPOILER · CH. ${m.chapter}</span>
          <span class="sub">Tap to reveal</span>
        </div>` : ''}
      </div>`;
    }).join('');
  }
  render();
</script>
</body>
</html>
