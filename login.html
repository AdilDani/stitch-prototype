<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STITCH — Sign In</title>
<link rel="stylesheet" href="css/core.css">
<style>
  /* Full-page dark grid background */
  body {
    min-height: 100vh;
    background: var(--ink);
    color: var(--paper);
    display: grid;
    place-items: center;
    padding: 40px 20px;
    position: relative;
  }

  /* Override grain for dark background */
  body::before { mix-blend-mode: overlay; opacity: 0.15; }

  /* Grid pattern (same as the old aside) */
  body::after {
    content: '';
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  /* Centered form card */
  .form-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
    background: var(--ink-2);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 48px;
  }
  @media (max-width: 520px) { .form-card { padding: 36px 24px; } }

  .brand-stamp {
    display: inline-flex; align-items: center; gap: 10px;
    margin-bottom: 36px;
    font-family: var(--font-mono); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: rgba(244,242,236,0.45);
  }
  .brand-stamp .bar { width: 28px; height: 2px; background: var(--accent); }

  .form-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(44px, 8vw, 64px);
    letter-spacing: -0.04em;
    line-height: 0.9;
    margin-bottom: 12px;
    color: var(--paper);
  }
  .form-sub {
    font-family: var(--font-editorial);
    font-style: italic;
    color: rgba(244,242,236,0.55);
    font-size: 17px;
    margin-bottom: 36px;
    line-height: 1.4;
  }

  .field-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 28px; }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(244,242,236,0.5);
  }
  .field-input {
    padding: 14px 16px;
    border: 1.5px solid rgba(244,242,236,0.15);
    background: var(--ink-3);
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--paper);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  .field-input::placeholder { color: rgba(244,242,236,0.2); }
  .field-input:focus {
    border-color: rgba(244,242,236,0.6);
    box-shadow: 4px 4px 0 var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 20px 24px;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: var(--paper); color: var(--ink);
    border: 1.5px solid var(--paper);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    margin-bottom: 24px;
  }
  .submit-btn:hover { transform: translate(-3px,-3px); box-shadow: 9px 9px 0 var(--accent); }
  .submit-btn:active { transform: translate(0,0); box-shadow: none; }

  .auth-link {
    font-size: 13px;
    color: rgba(244,242,236,0.5);
    text-align: center;
  }
  .auth-link a {
    color: var(--paper);
    font-weight: 700;
    border-bottom: 1px solid rgba(244,242,236,0.35);
    padding-bottom: 1px;
    transition: border-color 0.15s;
  }
  .auth-link a:hover { border-bottom-color: var(--paper); }

  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(244,242,236,0.4);
    margin-bottom: 36px;
    transition: color 0.15s;
  }
  .back-link:hover { color: rgba(244,242,236,0.85); }

  .finefoot {
    margin-top: 40px;
    font-size: 12px;
    color: rgba(244,242,236,0.3);
    line-height: 1.6;
    text-align: center;
  }
  .finefoot a {
    color: rgba(244,242,236,0.5);
    border-bottom: 1px solid rgba(244,242,236,0.25);
  }
  .finefoot a:hover { color: var(--paper); }
</style>
</head>
<body>

<div class="form-card">
  <a class="back-link" href="landing.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    Back
  </a>

  <div class="brand-stamp">
    <span class="bar"></span>
    <span>Access protocol</span>
  </div>

  <h1 class="form-title">Sign in.</h1>
  <p class="form-sub">Two-factor authentication follows. After that, you stay signed in until you log out.</p>

  <div class="field-group">
    <div class="field">
      <label class="field-label" for="email">Email address</label>
      <input class="field-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <label class="field-label" for="password">Password</label>
      <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>
  </div>

  <button class="submit-btn" onclick="location.href='otp.html?via=email'">Sign in</button>

  <div class="auth-link">
    Don't have an account? <a href="register.html">Create one</a>
  </div>

  <div class="finefoot">
    By continuing you accept our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
  </div>
</div>

</body>
</html>
