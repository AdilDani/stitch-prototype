<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STITCH — Sign In</title>
<link rel="stylesheet" href="css/core.css">
<style>
  body {
    min-height: 100vh;
    background: var(--ink);
    color: var(--paper);
    display: flex;
    justify-content: center;
    position: relative;
  }

  body::before { mix-blend-mode: overlay; opacity: 0.15; }

  body::after {
    content: '';
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .form-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 460px;
    min-height: 100vh;
    background: var(--ink-2);
    border-left: 1px solid rgba(255,255,255,0.1);
    border-right: 1px solid rgba(255,255,255,0.1);
    display: flex; flex-direction: column;
  }

  /* ── TOP: back link ── */
  .card-top {
    padding: 36px 48px;
    flex-shrink: 0;
  }

  /* ── MIDDLE: form, grows to fill remaining height ── */
  .card-body {
    flex: 1;
    display: flex; flex-direction: column; justify-content: flex-start;
    padding: 60px 48px 40px;
  }

  /* ── BOTTOM: auth link ── */
  .card-footer {
    flex-shrink: 0;
    padding: 28px 48px 44px;
    border-top: 1px solid rgba(255,255,255,0.07);
    text-align: center;
  }

  @media (max-width: 520px) {
    .card-top { padding: 28px 24px; }
    .card-body { padding: 0 24px 32px; }
    .card-footer { padding: 24px 24px 40px; }
  }

  .back-link {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(244,242,236,0.4);
    transition: color 0.15s;
  }
  .back-link:hover { color: rgba(244,242,236,0.85); }

  .form-title {
    font-family: var(--font-display);
    font-weight: 900;
    font-size: clamp(44px, 8vw, 64px);
    letter-spacing: -0.04em;
    line-height: 0.9;
    margin-bottom: 40px;
    color: var(--paper);
  }

  .field-group { display: flex; flex-direction: column; gap: 20px; margin-bottom: 28px; }

  .field { display: flex; flex-direction: column; gap: 7px; }
  .field-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(244,242,236,0.5);
  }
  .field-input {
    padding: 14px 16px;
    border: 1.5px solid rgba(244,242,236,0.15);
    background: var(--ink-3);
    font-family: var(--font-body);
    font-size: 15px;
    color: var(--paper);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
  }
  .field-input::placeholder { color: rgba(244,242,236,0.2); }
  .field-input:focus {
    border-color: rgba(244,242,236,0.6);
    box-shadow: 4px 4px 0 var(--accent);
  }

  .submit-btn {
    width: 100%;
    padding: 20px 24px;
    font-family: var(--font-display);
    font-weight: 800;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: var(--paper); color: var(--ink);
    border: 1.5px solid var(--paper);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .submit-btn:hover { transform: translate(-3px,-3px); box-shadow: 9px 9px 0 var(--accent); }
  .submit-btn:active { transform: translate(0,0); box-shadow: none; }

  .auth-link {
    font-size: 13px;
    color: rgba(244,242,236,0.5);
  }
  .auth-link a {
    color: var(--paper);
    font-weight: 700;
    border-bottom: 1px solid rgba(244,242,236,0.35);
    padding-bottom: 1px;
    transition: border-color 0.15s;
  }
  .auth-link a:hover { border-bottom-color: var(--paper); }
</style>
</head>
<body>

<div class="form-card">

  <div class="card-top">
    <a class="back-link" href="landing.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      Back
    </a>
  </div>

  <div class="card-body">
    <h1 class="form-title">Sign in.</h1>

    <div class="field-group">
      <div class="field">
        <label class="field-label" for="email">Email address</label>
        <input class="field-input" type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>
      <div class="field">
        <label class="field-label" for="password">Password</label>
        <input class="field-input" type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
    </div>

    <button class="submit-btn" onclick="location.href='otp.html?via=email'">Sign in</button>
  </div>

  <div class="card-footer">
    <div class="auth-link">
      Don't have an account? <a href="register.html">Create one</a>
    </div>
  </div>

</div>

</body>
</html>
