<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>STITCH — Media</title>
<link rel="stylesheet" href="css/core.css">
<style>
  .wrap { max-width: 720px; margin: 0 auto; padding: 0 0 80px; }
  @media (min-width: 1200px) { .wrap { max-width: 760px; } }

  .crown { padding: 28px 22px 16px; border-bottom: 1.5px solid var(--ink); }
  .crown h1 { font-size: 48px; letter-spacing: -0.04em; line-height: 0.92; }
  .crown p {
    font-family: var(--font-editorial); font-style: italic;
    color: var(--muted); font-size: 15px; margin-top: 8px;
  }

  .tools {
    position: sticky; top: var(--nav-h); z-index: 40;
    background: var(--paper);
    border-bottom: 1.5px solid var(--ink);
    padding: 16px 22px 14px;
    display: flex; gap: 10px; align-items: center;
    flex-wrap: wrap;
  }
  .tabs {
    display: flex;
    border: 1.5px solid var(--ink);
  }
  .tabs button {
    padding: 8px 14px;
    font-family: var(--font-display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer;
    border-right: 1px solid var(--ink);
    background: var(--paper);
  }
  .tabs button:last-child { border-right: none; }
  .tabs button.active { background: var(--ink); color: var(--paper); }

  .feed-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 8px 12px;
    border: 1.5px solid var(--ink);
    font-family: var(--font-display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; background: var(--paper);
    transition: all 0.15s;
  }
  .feed-btn:hover { background: var(--ink); color: var(--paper); }
  .feed-btn.has-filter { background: var(--ink); color: var(--paper); }

  /* novel chip — modal rows */
  .novel-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 6px 6px 6px;
    border: 1.5px solid var(--line-strong);
    cursor: pointer;
    background: var(--paper);
    transition: all 0.15s;
    width: 100%;
  }
  .novel-chip .avatar { width: 28px; height: 28px; overflow: hidden; flex-shrink: 0; }
  .novel-chip .avatar svg { width: 100%; height: 100%; }
  .novel-chip .label {
    font-family: var(--font-display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
    flex: 1;
  }
  .novel-chip.active { border-color: var(--ink); background: var(--ink); color: var(--paper); }

  /* feed modal */
  .feed-modal-overlay {
    position: fixed; inset: 0; z-index: 200;
    background: rgba(10,10,10,0.65);
    display: none; align-items: flex-start; justify-content: center;
    padding-top: calc(var(--nav-h) + 16px);
  }
  .feed-modal-overlay.open { display: flex; }
  .feed-modal {
    width: min(380px, calc(100vw - 32px));
    background: var(--paper);
    border: 1.5px solid var(--ink);
    max-height: 72vh;
    display: flex; flex-direction: column;
    box-shadow: 6px 6px 0 var(--ink);
  }
  .feed-modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 12px;
    border-bottom: 1.5px solid var(--ink);
    flex-shrink: 0;
  }
  .feed-modal-title {
    font-family: var(--font-display); font-weight: 900;
    font-size: 13px; letter-spacing: 0.14em; text-transform: uppercase;
  }
  .feed-modal-close {
    width: 30px; height: 30px;
    border: 1.5px solid var(--ink);
    display: grid; place-items: center;
    cursor: pointer; background: var(--paper);
    font-size: 16px; line-height: 1;
  }
  .feed-modal-close:hover { background: var(--ink); color: var(--paper); }
  .feed-modal-actions {
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .select-all-btn {
    padding: 7px 14px;
    border: 1.5px solid var(--ink);
    font-family: var(--font-display); font-weight: 700;
    font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
    cursor: pointer; background: var(--paper);
    transition: all 0.15s;
  }
  .select-all-btn:hover { background: var(--ink); color: var(--paper); }
  .feed-modal-list {
    overflow-y: auto;
    padding: 12px 18px;
    display: flex; flex-direction: column; gap: 8px;
    flex: 1;
  }

  .spoiler-toggle {
    margin-left: auto;
    width: 38px; height: 38px;
    border: 1.5px solid var(--ink);
    display: grid; place-items: center;
    cursor: pointer;
    background: var(--paper);
  }
  .spoiler-toggle.active { background: var(--accent); color: var(--paper); border-color: var(--accent); }

  /* masonry using CSS columns */
  .masonry { padding: 16px 22px; column-count: 2; column-gap: 10px; }
  .m-item {
    display: inline-block;
    width: 100%;
    margin: 0 0 10px;
    border: 1.5px solid var(--ink);
    overflow: hidden;
    background: var(--paper);
    position: relative;
  }
  .m-item .art { width: 100%; aspect-ratio: auto; overflow: hidden; background: var(--paper-2); }
  .m-item .art svg { width: 100%; display: block; }
  .m-item .meta {
    padding: 8px 10px 10px;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.08em;
  }
  .m-item .meta .type { display: inline-block; font-weight: 700; color: var(--accent); letter-spacing: 0.14em; }
  .m-item .meta .ti { font-family: var(--font-display); font-weight: 700; font-size: 13px; letter-spacing: -0.01em; margin-top: 2px; text-transform: none; color: var(--ink); }
  .m-item .meta .nv { color: var(--muted); text-transform: uppercase; margin-top: 4px; }

  /* quote card */
  .m-item.quote {
    display: flex; flex-direction: column;
    min-height: 240px;
    padding: 16px;
  }
  .m-item.quote .q {
    font-family: var(--font-editorial); font-style: italic;
    font-weight: 700; font-size: 18px; line-height: 1.15;
    color: var(--ink);
    margin-bottom: 12px;
  }
  .m-item.quote .q-meta {
    margin-top: auto;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em;
    color: var(--muted);
  }
  .m-item.quote .q-meta b { color: var(--accent); font-weight: 700; }

  /* spoiler overlay */
  .m-item .spoiler-cover {
    position: absolute; inset: 0;
    background: rgba(10,10,10,0.88);
    color: var(--paper);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 8px;
    font-family: var(--font-display); font-weight: 700;
    font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
    cursor: pointer;
    transition: opacity 0.3s;
  }
  .m-item.revealed .spoiler-cover { opacity: 0; pointer-events: none; }
  .spoiler-cover .sub { font-weight: 400; font-size: 10px; opacity: 0.7; letter-spacing: 0.1em; }

  /* join-discord card */
  .m-item.promo {
    min-height: 200px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 20px;
    background: var(--ink); color: var(--paper);
    border-color: var(--ink);
  }
  .m-item.promo .lbl {
    font-family: var(--font-display); font-weight: 900;
    font-size: 22px; letter-spacing: -0.02em; line-height: 1;
    text-align: center;
  }
  .m-item.promo .cta {
    margin-top: 12px;
    padding: 6px 12px; border: 1px solid currentColor;
    font-family: var(--font-mono); font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase;
  }
</style>
</head>
<body>

<nav class="global-nav" data-global-nav></nav>

<div class="wrap">

  <section class="crown">
    <h1 class="display">Media.</h1>
    <p>Fan art, memes, and splash visuals from every novel you follow. Novels you haven't caught up on stay safely blurred.</p>
  </section>

  <div class="tools">
    <div class="tabs" id="tabs">
      <button data-tab="fanart" class="active">Fan Art</button>
      <button data-tab="meme">Memes</button>
      <button data-tab="official">Official</button>
      <button data-tab="all">All</button>
    </div>
    <button class="feed-btn" id="feed-btn">
      Feed <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </button>
    <button class="spoiler-toggle" id="spoil" title="Toggle spoilers">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
    </button>
  </div>

  <div class="masonry" id="gallery"></div>

</div>

<!-- feed filter modal -->
<div class="feed-modal-overlay" id="feed-modal-overlay">
  <div class="feed-modal">
    <div class="feed-modal-head">
      <span class="feed-modal-title">Filter Feed</span>
      <button class="feed-modal-close" id="feed-modal-close">×</button>
    </div>
    <div class="feed-modal-actions">
      <button class="select-all-btn" id="select-all-btn">Select All</button>
    </div>
    <div class="feed-modal-list" id="feed-modal-list"></div>
  </div>
</div>

<script src="js/state.js"></script>
<script src="js/ui.js"></script>
<script>
  renderGlobalNav('media');
  (function() {
    const T = 'hub_theme';
    if (localStorage.getItem(T) === 'dark') document.body.classList.add('dark');
    const nav = document.querySelector('.global-nav');
    const btn = document.createElement('button');
    btn.className = 'theme-btn-hub'; btn.id = 'theme-btn';
    nav.insertBefore(btn, nav.querySelector('.profile-btn'));
    function upd() {
      const dark = document.body.classList.contains('dark');
      btn.innerHTML = dark
        ? '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="6"/><line x1="12" y1="18" x2="12" y2="22"/><line x1="2" y1="12" x2="6" y2="12"/><line x1="18" y1="12" x2="22" y2="12"/></svg>'
        : '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      btn.title = dark ? 'Light mode' : 'Dark mode';
    }
    btn.addEventListener('click', () => {
      document.body.classList.toggle('dark');
      localStorage.setItem(T, document.body.classList.contains('dark') ? 'dark' : 'light');
      upd();
    });
    upd();
  })();

  let tab = 'fanart';
  let showSpoilers = false;
  const FOLLOWED_IDS = STITCH.getUser().followed;
  let selectedBooks = new Set(); // empty = show all

  // modal
  const overlay = document.getElementById('feed-modal-overlay');
  const feedBtn = document.getElementById('feed-btn');
  const closeBtn = document.getElementById('feed-modal-close');
  const selectAllBtn = document.getElementById('select-all-btn');
  const modalList = document.getElementById('feed-modal-list');

  function renderModalList() {
    modalList.innerHTML = FOLLOWED_IDS.map(id => {
      const n = STITCH.getNovel(id);
      return `<button class="novel-chip ${selectedBooks.has(id)?'active':''}" data-n="${id}">
        <span class="avatar">${coverSvg(n.cover)}</span>
        <span class="label">${n.title}</span>
      </button>`;
    }).join('');

    const allSelected = FOLLOWED_IDS.every(id => selectedBooks.has(id));
    selectAllBtn.textContent = allSelected ? 'Deselect All' : 'Select All';

    const hasFilter = selectedBooks.size > 0 && !allSelected;
    feedBtn.classList.toggle('has-filter', selectedBooks.size > 0 && !allSelected);
    const count = selectedBooks.size;
    feedBtn.innerHTML = (count > 0 && !allSelected)
      ? `Feed · ${count} <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`
      : `Feed <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>`;
  }

  feedBtn.addEventListener('click', () => { overlay.classList.add('open'); renderModalList(); });
  closeBtn.addEventListener('click', () => overlay.classList.remove('open'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

  selectAllBtn.addEventListener('click', () => {
    const allSelected = FOLLOWED_IDS.every(id => selectedBooks.has(id));
    if (allSelected) {
      selectedBooks.clear();
    } else {
      FOLLOWED_IDS.forEach(id => selectedBooks.add(id));
    }
    renderModalList();
    render();
  });

  modalList.addEventListener('click', e => {
    const b = e.target.closest('[data-n]'); if (!b) return;
    const id = b.dataset.n;
    if (selectedBooks.has(id)) selectedBooks.delete(id);
    else selectedBooks.add(id);
    renderModalList();
    render();
  });

  document.getElementById('tabs').addEventListener('click', e => {
    const b = e.target.closest('[data-tab]'); if (!b) return;
    tab = b.dataset.tab;
    document.querySelectorAll('#tabs button').forEach(x => x.classList.toggle('active', x.dataset.tab === tab));
    render();
  });

  document.getElementById('spoil').addEventListener('click', e => {
    showSpoilers = !showSpoilers;
    document.getElementById('spoil').classList.toggle('active', showSpoilers);
    render();
  });

  function render() {
    let items = STITCH.MEDIA.filter(m => FOLLOWED_IDS.includes(m.novel));
    if (tab !== 'all') items = items.filter(m => m.type === tab);
    if (selectedBooks.size > 0) items = items.filter(m => selectedBooks.has(m.novel));

    const gallery = document.getElementById('gallery');
    gallery.innerHTML = items.map(m => {
      const novel = STITCH.getNovel(m.novel);
      const blurred = !showSpoilers && (m.spoiler || m.chapter > (STITCH.getUser().readCaps[m.novel] ?? 0));

      // quote memes render as pull-quotes
      if (m.art === 'quote-meme') {
        return `<div class="m-item quote ${blurred?'':'revealed'}">
          <div class="q">"When they tell you the walls are meant to protect you, ask who built them."</div>
          <div class="q-meta"><b>QUOTE MEME</b><br>@TRUTH_SEEKER · ${novel.title}</div>
          ${blurred ? `<div class="spoiler-cover" onclick="this.parentNode.classList.add('revealed')">Spoiler<span class="sub">Tap to reveal</span></div>` : ''}
        </div>`;
      }

      return `<div class="m-item ${blurred?'':'revealed'}">
        <div class="art">${artSvg(m.art)}</div>
        <div class="meta">
          <span class="type">${m.type.toUpperCase()}</span>
          <div class="ti">${m.title}</div>
          <div class="nv">${novel.title} · Ch.${m.chapter}</div>
        </div>
        ${blurred ? `<div class="spoiler-cover" onclick="this.parentNode.classList.add('revealed')">Spoiler · Ch. ${m.chapter}<span class="sub">Tap to reveal</span></div>` : ''}
      </div>`;
    }).join('') + `<div class="m-item promo">
      <div class="lbl">Join the STITCH Discord</div>
      <div class="cta">Open ↗</div>
    </div>`;
  }
  render();
</script>
</body>
</html>
